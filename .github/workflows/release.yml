name: Release

# Cut a release by pushing a version tag:  git tag v0.2.0 && git push origin v0.2.0
# Each RID is published on a matching runner (R2R is per-architecture), then all
# binaries are attached to one GitHub Release with auto-generated notes.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the release + upload assets

jobs:
  build:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,   ext: ".exe" }
          - { os: windows-latest, rid: win-arm64, ext: ".exe" }
          - { os: ubuntu-latest,  rid: linux-x64,  ext: ""     }
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5  # SDK band comes from global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Same flags as build.ps1's shipped default: self-contained single-file, R2R on,
      # compression off (fast cold start), partial trimming (TrimMode=partial lives in the
      # csproj). win-arm64 R2R cross-compiles fine from the x64 Windows runner (crossgen2).
      - name: Publish
        shell: bash
        run: |
          dotnet publish src/Tittle/Tittle.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true -o publish \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=false \
            -p:PublishReadyToRun=true \
            -p:PublishTrimmed=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "publish/Tittle${{ matrix.ext }}" "out/Tittle-${{ github.ref_name }}-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: out/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Velopack installer + delta auto-update channel (win-x64 only). Publishes the app as a FOLDER (NOT
  # single-file — single-file would make every delta the whole 121MB), packs with vpk, and attaches
  # Setup.exe / RELEASES-win-x64 / full+delta .nupkg to the SAME release the `release` job just made.
  # arm64 + linux stay on the portable single-file artifacts above.
  velopack:
    name: Velopack win-x64 installer
    needs: release        # the GitHub Release must exist before `vpk upload --merge` can attach to it
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Folder publish (R2R + partial trim like the portable build, but WITHOUT PublishSingleFile) so
      # deltas only carry the changed files (mainly Tittle.dll ~3.4MB).
      - name: Publish (folder, not single-file)
        shell: bash
        run: |
          dotnet publish src/Tittle/Tittle.csproj -c Release -r win-x64 \
            --self-contained true -o publish-velo \
            -p:PublishReadyToRun=true \
            -p:PublishTrimmed=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Install vpk
        run: dotnet tool install -g vpk --version 1.2.0

      # Pull the previous channel release so vpk can compute a delta against it. Tolerate failure: the
      # FIRST Velopack release has no prior base (the delta then just doesn't exist; full package ships).
      - name: Download prior release (delta base)
        shell: bash
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/danscMax/Tittle --channel win-x64 --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"   # v0.2.0 -> 0.2.0 (vpk wants SemVer with no leading 'v')
          vpk pack --packId Tittle --packVersion "$VER" --packDir publish-velo \
            --mainExe Tittle.exe --packTitle Tittle --icon src/Tittle/Assets/tittle.ico \
            --channel win-x64

      - name: Upload to the GitHub Release
        shell: bash
        run: |
          vpk upload github --repoUrl https://github.com/danscMax/Tittle --channel win-x64 \
            --token ${{ secrets.GITHUB_TOKEN }} --merge --tag "$GITHUB_REF_NAME" --releaseName "$GITHUB_REF_NAME"
