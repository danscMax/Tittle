name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore SeriousView.sln

      - name: Build
        run: dotnet build SeriousView.sln --no-restore -c Release

      # Avalonia.Headless runs without a display server — no xvfb needed.
      - name: Test
        run: dotnet test SeriousView.sln --no-build -c Release --verbosity normal

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify formatting
        run: dotnet format SeriousView.sln --verify-no-changes --verbosity diagnostic
