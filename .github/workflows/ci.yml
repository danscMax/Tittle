name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-flight run when a newer commit supersedes it (a push burst no longer
# leaves a tail of doomed runs grinding to completion). PRs and main isolate by ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5  # SDK band comes from global.json

      # No lockfiles (RID-native packages don't play with RestorePackagesWithLockFile), so cache the
      # global package folder keyed on the single CPM manifest instead of setup-dotnet's lockfile cache.
      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore SeriousView.sln

      - name: Build
        run: dotnet build SeriousView.sln --no-restore -c Release

      # Avalonia.Headless runs without a display server — no xvfb needed.
      - name: Test
        run: dotnet test SeriousView.sln --no-build -c Release --verbosity normal

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5  # SDK band comes from global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Verify formatting
        run: dotnet format SeriousView.sln --verify-no-changes --verbosity diagnostic
